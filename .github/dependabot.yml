version: 2

# Dependency updates are now managed by Renovate (renovate.json).
# Dependabot is kept only for GitHub Actions as a fallback,
# but Renovate's github-actions manager handles this too once installed.

updates:
  # GitHub Actions — Renovate also covers this; keeping as belt-and-suspenders
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
