name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run docs:sync-readmes
      - run: npm run build
      - name: Build docs site
        env:
          DOCS_BASE: /eslint-config-basic/
          DOCS_SITE_URL: https://santi020k.github.io/eslint-config-basic
        run: npm run docs:build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: packages/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
