name: Changeset Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  changeset:
    name: Require changeset
    runs-on: ubuntu-latest
    # Skip for version-packages PRs (changesets are consumed) and skip-changelog label
    if: >-
      ${{
        !contains(github.event.pull_request.labels.*.name, 'skip-changelog') &&
        !startsWith(github.event.pull_request.title, 'chore(release): version packages')
      }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Assert changeset present
        run: pnpm exec changeset status --since=origin/main
