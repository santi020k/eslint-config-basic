name: Playground Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playground:
    name: Lint all playgrounds
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Turborepo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-playground-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-playground-
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Lint all playgrounds
        run: pnpm --filter "@playground/*" run lint
