name: Sync Agent Skills

# Keeps AI coding-assistant skill files up to date whenever the ESLint config
# changes.  The workflow:
#   1. Builds the package so the CLI is available.
#   2. Runs `basic-eslint generate-skill --force` to regenerate skills for every
#      detected agent folder (.agent, .agents, .claude, .cursor, .windsurf, …).
#   3. If any file changed, commits and pushes the update directly to the branch.
#
# Users of @santi020k/eslint-config-basic can copy this workflow into their own
# projects.  The only requirement is that the package is installed.

on:
  push:
    branches: [main]
    paths:
      # Regenerate when the config or generator itself changes
      - 'packages/basic/src/**'
      - 'packages/core/src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  # Allow manual re-runs from the Actions tab
  workflow_dispatch:

jobs:
  sync-agent-skills:
    name: Regenerate agent skill files
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Need full history so the commit push works
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      # Run the generator with --force so existing files are refreshed
      - name: Generate agent skill files
        run: node packages/basic/dist/cli.js generate-skill --force

      # Only commit when there are actual changes
      - name: Commit updated skill files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No agent skill files changed — nothing to commit."
          else
            git commit -m "chore(agent-skills): sync eslint standards skill files [skip ci]"
            git push
          fi
