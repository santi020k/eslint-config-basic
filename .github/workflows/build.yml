name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]

    # Turbo remote cache — set TURBO_TOKEN and TURBO_TEAM in repo secrets for cross-run caching
    # See: https://turbo.build/repo/docs/ci/github-actions#remote-caching
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Turborepo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - name: Spellcheck
        run: pnpm run lint:spell
      - name: TypeScript check
        run: pnpm run typecheck
      - name: Unused code check
        run: pnpm run lint:knip
      - run: pnpm run build
      - run: pnpm run lint
      - name: Run tests with coverage
        run: pnpm run test:coverage
      - name: Dry-run publish check
        run: pnpm --filter @santi020k/eslint-config-basic publish --dry-run
          --no-git-checks
